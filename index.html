<html>
  <head>
    <meta charset="UTF-8">
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://runeapps.org/nis/nis.css"
    />
    <script src="https://www.unpkg.com/alt1/dist/base/index.js"></script>
    <script src="https://www.unpkg.com/alt1/dist/ocr/index.js"></script>
    <script src="https://www.unpkg.com/alt1/dist/chatbox/index.js"></script>
  </head>
  <style>
:root {
  --rs-bg: #16120d;
  --rs-panel: #241c13;
  --rs-panel-2: #2d2418;
  --rs-border: #6a5738;
  --rs-border-dark: #3b2d1b;
  --rs-text: #e7d7b3;
  --rs-text-dim: #b8a27c;
  --rs-accent: #caa45a;
  --rs-accent-2: #8e6b2f;
  --rs-button: #3a2d1b;
  --rs-button-hover: #4a3923;
  --rs-button-active: #2c2114;
  --rs-shadow: rgba(0, 0, 0, 0.35);
}
#angleGroups::-webkit-scrollbar {
  width: 8px;
}

#angleGroups::-webkit-scrollbar-track {
  background: #1a140d;
}

#angleGroups::-webkit-scrollbar-thumb {
  background: #6a5738;
  border-radius: 4px;
}

#angleGroups::-webkit-scrollbar-thumb:hover {
  background: #8e6b2f;
}



* {
  box-sizing: border-box;
}

body.rs-ui {
  margin: 0;
  padding: 14px;
  background:
    linear-gradient(rgba(10, 8, 6, 0.82), rgba(10, 8, 6, 0.82)),
    radial-gradient(circle at top, #3a2b19 0%, #17120d 60%);
  color: var(--rs-text);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 14px;
}

html, body {
  overflow: hidden;
}

#appShell {
  display: grid;
  gap: 12px;
}

#angleGroups {
  max-height: 510;
  overflow-y: auto;
  padding: 12px;
}


.panel-anglegroups {
  display: flex;
  flex-direction: column;
}

.panel-anglegroups #angleGroups {
  flex: 2;
}


#topRow {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: start;
}

.panel {
  background: linear-gradient(180deg, var(--rs-panel-2), var(--rs-panel));
  border: 1px solid var(--rs-border);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.05),
    0 4px 14px var(--rs-shadow);
  border-radius: 8px;
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 12px;
  color: #f2e2bc;
  font-weight: bold;
  letter-spacing: 0.2px;
  background:
    linear-gradient(180deg, #4c3a22, #352818);
  border-bottom: 1px solid var(--rs-border-dark);
}

.panel-canvas,
.panel-status {
  min-height: 100%;
}

.panel-canvas canvas {
  display: block;
  width: auto;
  height: auto;
  max-width: none;
  background: #0c0c0c;
  border-top: 1px solid #000;
}

.panel-status .info-grid {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 8px 12px;
  padding: 12px;
}

.label {
  color: var(--rs-text-dim);
  font-weight: bold;
}

.controls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px;
}

.checkbox-row {
  padding-top: 0;
}

button {
  appearance: none;
  border: 1px solid var(--rs-border);
  background: linear-gradient(180deg, var(--rs-button-hover), var(--rs-button));
  color: var(--rs-text);
  padding: 8px 12px;
  border-radius: 6px;
  font: inherit;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.06),
    0 1px 2px rgba(0, 0, 0, 0.25);
  transition: background 0.15s ease, transform 0.05s ease;
}

button:hover {
  background: linear-gradient(180deg, #5a4427, var(--rs-button-hover));
}

button:active {
  background: linear-gradient(180deg, var(--rs-button-active), var(--rs-button));
  transform: translateY(1px);
}

.small-btn {
  padding: 5px 9px;
  font-size: 12px;
}

.checkbox-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--rs-text);
  background: rgba(0, 0, 0, 0.12);
  border: 1px solid var(--rs-border-dark);
  padding: 8px 10px;
  border-radius: 6px;
}

input[type="checkbox"] {
  accent-color: var(--rs-accent);
  transform: scale(1.1);
}

#tetraList,
#angleGroups {
  padding: 12px;
}

#tetraList {
  line-height: 1.5;
}

#tetraList > div {
  padding: 3px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

#tetraList > div:last-child {
  border-bottom: none;
}

/* Optional: better native tooltip hinting through dotted underline on hoverable labels */
[title] {
  position: relative;
}


  </style>


<body class="rs-ui">
  <div id="appShell">
    <div id="topRow">
      <div class="panel panel-canvas">
        <div class="panel-header">Arrow Preview</div>
        <canvas id="debugCanvas"></canvas>
      </div>

      <div class="panel panel-status">
        <div class="panel-header">Detection Info</div>

        <div class="info-grid">
          <div class="label">Clue window</div>
          <div><span id="clueState">not found</span></div>

          <div class="label">Anchor</div>
          <div><span id="anchorPos">-</span></div>

          <div class="label">Arrow angle</div>
          <div><span id="arrowAngle">-</span></div>

          <div class="label">Dark pixels</div>
          <div><span id="darkPixels">-</span></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">Controls</div>

      <div class="controls-row">
        <button
          id="showBankOverlayBtn"
          title="Scan the visible bank and show group numbers on matching tetra slots for 10 seconds."
        >
          Show bank overlay
        </button>

        <button
          id="saveAngleBtn"
          title="Manually save the currently detected tetra angle to the list."
        >
          Save current tetra
        </button>

        <button
          id="undoAngleBtn"
          title="Remove the most recently saved tetra angle."
        >
          Undo last
        </button>

        <button
          id="clearAnglesBtn"
          title="Clear all saved tetra angles and reset grouping."
        >
          Clear all
        </button>
      </div>

      <div class="controls-row checkbox-row">
        <label
          class="checkbox-label"
          title="Automatically save a tetra when the detected angle changes enough from the last saved one."
        >
          <input type="checkbox" id="autoSaveToggle">
          <span>Auto save current tetra</span>
        </label>
        <label class="checkbox-label" title="Show or hide the Alt1 cursor tooltip with tetra scan progress.">
          <input type="checkbox" id="tooltipToggle" checked>
          <span>Show tooltip</span>
        </label>

      </div>
    </div>

    <div class="panel panel-anglegroups">

    <div class="panel">
<div class="panel-header">
  <span>Angle groups and highlight filter</span>

  <div style="display:flex; gap:8px; align-items:center;">
    <select id="angleGroupSortSelect" title="Sort the angle groups by default order, group size, or angle.">
      <option value="default">Default</option>
      <option value="count-desc">Most matches first</option>
      <option value="angle-asc">Angle ascending</option>
    </select>

    <button
      id="showAllGroupsBtn"
      type="button"
      class="small-btn"
      title="Clear the active group filter and show all groups again."
    >
      Show all
    </button>
  </div>
</div>


      <div class="panel panel-anglegroups">


      <div id="angleGroups">No groups yet.</div>
    </div>
    </div>
  </div>

  <script src="scripts/script.js"></script>
</body>

  <script src="scripts/script.js"></script>
</html>
